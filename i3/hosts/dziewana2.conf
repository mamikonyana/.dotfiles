# dziewana2 — laptop with external 4K HDMI display
# eDP-1: built-in screen   HDMI-1: external 4K@30Hz (scaled 0.5x for HiDPI)

exec_always --no-startup-id xrandr --output HDMI-1 --transform none --mode 3840x2160 --rate 30 --left-of eDP-1

workspace $ws1  output HDMI-1
workspace $ws2  output HDMI-1
workspace $ws3  output HDMI-1
workspace $ws4  output HDMI-1
workspace $ws5  output HDMI-1
workspace $ws6  output HDMI-1
workspace $ws7  output eDP-1
workspace $ws8  output eDP-1
workspace $ws9  output eDP-1
workspace $ws10 output eDP-1
